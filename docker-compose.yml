version: "3.8"

services:
  mongodb:
    image: mongo:6
    container_name: reclamtrack-mongodb
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-secret}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  api-gateway:
    build:
      context: ./microservices/api-gateway
      dockerfile: Dockerfile
    container_name: reclamtrack-api-gateway
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - AUTH_SERVICE_URL=http://auth-service:3001
      - COMPLAINTS_SERVICE_URL=http://complaints-service:3002
      - TEAMS_SERVICE_URL=http://teams-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
      - ANALYTICS_SERVICE_URL=http://analytics-service:3005
      - INVENTORY_SERVICE_URL=http://inventory-service:3006
      - AI_SERVICE_URL=http://ai-service:3007
      - LEGACY_BACKEND_URL=http://host.docker.internal:5009
    depends_on:
      - auth-service
      - complaints-service
      - teams-service
      - notification-service
      - analytics-service
      - inventory-service
      - ai-service
    restart: unless-stopped

  auth-service:
    build:
      context: ./microservices/auth-service
      dockerfile: Dockerfile
    container_name: reclamtrack-auth-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/reclamtrack?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  complaints-service:
    build:
      context: ./microservices/complaints-service
      dockerfile: Dockerfile
    container_name: reclamtrack-complaints-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/reclamtrack?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  teams-service:
    build:
      context: ./microservices/teams-service
      dockerfile: Dockerfile
    container_name: reclamtrack-teams-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/reclamtrack?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: ./microservices/notification-service
      dockerfile: Dockerfile
    container_name: reclamtrack-notification-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/reclamtrack?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  analytics-service:
    build:
      context: ./microservices/analytics-service
      dockerfile: Dockerfile
    container_name: reclamtrack-analytics-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/reclamtrack?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  inventory-service:
    build:
      context: ./microservices/inventory-service
      dockerfile: Dockerfile
    container_name: reclamtrack-inventory-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/reclamtrack?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ./microservices/ai-service
      dockerfile: Dockerfile
    container_name: reclamtrack-ai-service
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/reclamtrack?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: reclamtrack-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost
    depends_on:
      - api-gateway
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: reclamtrack-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - api-gateway
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: reclamtrack-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mongodb_data:
