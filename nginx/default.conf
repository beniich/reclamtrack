server {
    listen 80;
    server_name reclamtrack.ricecloud.net;

    # Sécurité basique
    server_tokens off;

    # 1. Challenge Let's Encrypt pour obtenir/renouveler le certificat SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 2. Redirection HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 3. Serveur HTTPS — ACTIF avec Let's Encrypt
server {
    listen 443 ssl;
    server_name reclamtrack.ricecloud.net;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/reclamtrack.ricecloud.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reclamtrack.ricecloud.net/privkey.pem;

    # Options SSL recommandées
    ssl_buffer_size 8k;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api-gateway:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://api-gateway:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
