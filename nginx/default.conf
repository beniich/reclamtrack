server {
    listen 80;
    server_name localhost; # Remplacer par votre-domaine.com

    # Sécurité basique
    server_tokens off;

    # 1. Challenge Let's Encrypt pour obtenir le certificat SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 2. Redirection HTTP -> HTTPS (À décommenter une fois le SSL généré)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # (Laisser actif tant que le SSL n'est pas généré, puis supprimer quand la redirection ci-dessus est active)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api-gateway:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://api-gateway:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

